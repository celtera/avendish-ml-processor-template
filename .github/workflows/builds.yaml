name: Build

on:
  pull_request:
  push:
    branches: [main, master]
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ossia/actions/.github/workflows/avnd-addon.yml@master
    secrets: inherit
    with:
      # CATEGORY object: ONNX inference object back-ends.
      pd: true
      max: true
      python: true
      touchdesigner: true
      godot: true
      wasm: true
