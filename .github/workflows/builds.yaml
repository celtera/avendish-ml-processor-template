name: Build

on:
  pull_request:
  push:
    branches: [main, master]
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Build in/against ossia score: dev tree, SDK, and JIT artifact tracks.
  score:
    uses: ossia/actions/.github/workflows/score-addon.yml@master
    secrets: inherit
    with:
      release: false  # the templates ship no release.sh

  # Build the same object(s) standalone, one artifact per back-end.
  standalone:
    uses: ossia/actions/.github/workflows/avnd-addon.yml@master
    secrets: inherit
    with:
      # ONNX inference object back-ends. wasm omitted: onnxruntime ships no
      # WebAssembly C++ build (cmake/onnxruntime.cmake only covers
      # win-x64 / macos-arm64 / linux-x64+aarch64).
      pd: true
      max: true
      python: true
      touchdesigner: true
      godot: true
